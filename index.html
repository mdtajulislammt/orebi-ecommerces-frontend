<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/ologo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title -->
    <title>OREBI - ecommarce</title>
    <!-- Google Fonts Here -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
  </head>
  <body class=" overflow-x-hidden">
    <style>
      .preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      .preloader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .loader-logo {
        width: 80px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .loader-bar {
        width: 120px;
        height: 2px;
        background: #f0f0f0;
        position: relative;
        overflow: hidden;
        border-radius: 2px;
      }
      .loader-bar::after {
        content: '';
        position: absolute;
        left: -100%;
        width: 100%;
        height: 100%;
        background: #262626;
        animation: loading 1.5s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.1); opacity: 1; }
      }
      @keyframes loading {
        0% { left: -100%; }
        50% { left: 0; }
        100% { left: 100%; }
      }
    </style>
    <div id="root">
      <div class="preloader">
        <div class="preloader-content">
          <img src="/assets/ologo.png" alt="OREBI" class="loader-logo">
          <div class="loader-bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
